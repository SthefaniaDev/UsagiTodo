<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>UsagiTodo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>UsagiTodo</h1>
  <!-- GIF do topo -->
  <img src="./assets/dance-bunny.gif" alt="coelho feliz" class="gif-top">

  <div class="container">
    <!-- Para Fazer -->
    <div class="box" id="todoBox">
      <h2>PARA FAZER</h2>
      <div class="tasks" id="todoTasks">
        <div class="task">
          
          
        </div>
      </div>
      <button class="add-btn" onclick="addTask()">ADD</button>
    </div>

    <!-- Feito -->
    <div class="box" id="doneBox">
      <h2>FEITO</h2>
      <div class="tasks" id="doneTasks"></div>
    </div>
  </div>

  <!-- GIF do canto inferior -->
  <img src="./assets/bunny-round.gif" alt="coelho sentado" class="gif-bottom">

  <script src="script.js"></script>
</body>
</html>
